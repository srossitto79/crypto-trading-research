# ── Axiom Paper-Trade Stack ────────────────────────────────────────
#
# Quick start:
#   1. docker compose up -d
#   2. docker compose exec axiom python -m axiom.agent health
#   3. docker compose exec axiom python -m axiom.agent enqueue \
#        --file /app/axiom/strategies/builtin/example.py \
#        --dataset BTC/USDT-1h
#   4. docker compose exec axiom python -m axiom.agent list --status paper
#
# Paper-trade pipeline stages:
#   researching → backtesting → paper → deployed
#
# The scheduler + gauntlet run inside the API process so strategies
# auto-advance through gates when they meet criteria.

services:
  # ── Axiom backend (API + scheduler + gauntlet) ──────────────────
  backend:
    build: .
    image: axiom:latest
    container_name: axiom-backend
    restart: unless-stopped

    ports:
      - "8003:8003"

    env_file:
      - .env

    environment:
      # ── Container-specific overrides ──────────────────────────
      - AXIOM_HOME=/data
      - AXIOM_HOST=0.0.0.0

      # ── Paper-trade behaviour ─────────────────────────────────
      # - AXIOM_BOT_OWNS_RUNTIME=true # dont set it so the api will manage it without a separate container
      - AXIOM_ENABLE_REGIME_LAB=0

      # ── LAN metrics enricher ──────────────────────────────────
      - LAN_METRICS_URL=http://192.168.0.210:8001

      # ── Python runtime ────────────────────────────────────────
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1

    volumes:
      - axiom_data:/data
      - ./axiom:/app/axiom:cached

    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://127.0.0.1:8003/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "512M"

  # ── SvelteKit frontend (vite preview of built static files) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      args:
        - VITE_AXIOM_API_KEY=${VITE_AXIOM_API_KEY}
        - VITE_AXIOM_OPERATOR_KEY=${VITE_AXIOM_OPERATOR_KEY}
    image: axiom-frontend:latest
    container_name: axiom-frontend
    restart: unless-stopped

    ports:
      - "5173:5173"

    environment:
      - AXIOM_CLIENT_BASE=http://192.168.0.200:8003

    depends_on:
      backend:
        condition: service_healthy

  # ── Discord bot (gateway only — backend owns all runtime loops) ──
  discord-bot:
    image: axiom:latest
    container_name: axiom-discord
    restart: unless-stopped
    entrypoint: ["python", "-m", "axiom", "bot", "start"]

    env_file:
      - .env

    environment:
      - AXIOM_HOME=/data
      - DISCORD_OWNER_ID=966019983379419186
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # Gateway only — backend owns scheduler/agent/brain loops
      # AXIOM_BOT_OWNS_RUNTIME is intentionally NOT set

    volumes:
      - axiom_data:/data
      - ./axiom:/app/axiom:cached

    depends_on:
      backend:
        condition: service_healthy

volumes:
  axiom_data:
    name: axiom_data
    driver: local
